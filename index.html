<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Brasileira · Braga — Menu</title>
<!-- v2 -->
<link rel="icon" href="images/cropped-ABrasileira_FAV_branco-270x270.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --bg:#0a0908;
  --panel:#121009;
  --card:#15130c;
  --line:#2b271d;
  --cream:#ece3d2;
  --cream-dim:#cfc5b0;
  --muted:#8d8672;
  --accent:#c9b586;
  --radius:18px;
  --serif:'Forum',serif;
  --sans:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--cream);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font-family:inherit;background:none;border:none;color:inherit;cursor:pointer}

/* ---------- ornament ---------- */
.orn{display:flex;align-items:center;justify-content:center;gap:14px;color:var(--muted)}
.orn::before,.orn::after{content:"";height:1px;width:56px;background:linear-gradient(90deg,transparent,var(--muted));display:block}
.orn::after{background:linear-gradient(90deg,var(--muted),transparent)}
.orn .d{width:6px;height:6px;border:1px solid var(--muted);transform:rotate(45deg);flex:none}
.orn h2,.orn span{font-family:var(--serif);letter-spacing:.35em;text-transform:uppercase;font-weight:400;color:var(--cream);text-align:center}

/* ---------- top nav ---------- */
.nav{position:fixed;top:18px;left:18px;z-index:60;display:flex;align-items:center;gap:4px;
  background:rgba(10,9,8,.82);backdrop-filter:blur(14px);border:1px solid var(--line);
  border-radius:14px;padding:8px 14px 8px 8px}
.nav .burger{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:.3s}
.nav .burger span{display:block;width:16px;height:1.5px;background:var(--cream);transition:.3s}
.nav .burger:hover{border-color:var(--accent)}
.nav .logo img{height:30px;width:auto;margin:0 10px}
.nav .links{display:flex;gap:4px}
.nav .links a{font-size:11px;letter-spacing:.18em;text-transform:uppercase;padding:10px 12px;border-radius:9px;color:var(--cream-dim);transition:.25s}
.nav .links a:hover,.nav .links a.on{color:var(--cream);background:rgba(236,227,210,.06)}

.langbar{position:fixed;top:18px;right:18px;z-index:60;display:flex;gap:2px;
  background:rgba(10,9,8,.82);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:14px;padding:6px}
.langbar button{padding:4px;border-radius:7px;transition:.25s;display:flex;opacity:.45;line-height:0}
.langbar button.on{opacity:1;background:var(--cream);box-shadow:0 0 0 1px var(--cream)}
.langbar button:not(.on):hover{opacity:.85}
.langbar button img{width:24px;height:16px;object-fit:cover;border-radius:3px;display:block}

/* ---------- overlay menu ---------- */
.overlay{position:fixed;inset:0;z-index:100;background:#0a0908;display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:opacity .45s ease,visibility .45s}
.overlay.open{opacity:1;visibility:visible}
.overlay .close{position:absolute;top:26px;left:26px;width:44px;height:44px;border:1px solid var(--line);border-radius:12px;font-size:18px;color:var(--cream);transition:.3s}
.overlay .close:hover{border-color:var(--accent);transform:rotate(90deg)}
.overlay nav{display:flex;flex-direction:column;align-items:center;gap:6px}
.overlay nav a{font-family:var(--serif);font-size:clamp(34px,6vw,58px);letter-spacing:.08em;text-transform:uppercase;color:var(--cream);
  opacity:0;transform:translateY(24px);transition:color .3s}
.overlay.open nav a{animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards}
.overlay nav a:hover{color:var(--accent)}
@keyframes rise{to{opacity:1;transform:none}}
.overlay .orn{margin:26px 0}

/* ---------- layout ---------- */
.wrap{padding:12px;max-width:1700px;margin:0 auto}
.grid-home{display:grid;grid-template-columns:1.9fr 1fr;gap:12px;min-height:calc(100vh - 24px)}
.card{position:relative;border-radius:var(--radius);overflow:hidden;background:var(--panel);border:1px solid var(--line)}
.card img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;transition:transform 1.2s cubic-bezier(.2,.7,.2,1),opacity .6s}
.card:hover img{transform:scale(1.045)}
.card .shade{position:absolute;inset:0;background:linear-gradient(200deg,rgba(10,9,8,.05) 30%,rgba(10,9,8,.86) 100%)}

.hero-home{min-height:78vh;display:flex}
.hero-home .inner{position:relative;z-index:2;align-self:flex-end;padding:clamp(28px,5vw,64px)}
.hero-home h1{font-family:var(--serif);font-weight:400;font-size:clamp(52px,7.5vw,118px);line-height:.95;letter-spacing:.02em;text-transform:uppercase}
.hero-home p{margin-top:18px;color:var(--cream-dim);letter-spacing:.28em;text-transform:uppercase;font-size:12px}

.side{display:flex;flex-direction:column;gap:12px}
.side .card{flex:1;min-height:150px;display:flex}
.side .card .label{position:relative;z-index:2;align-self:flex-end;width:100%;display:flex;align-items:center;justify-content:space-between;padding:20px 22px}
.side .card .label span{font-family:var(--serif);letter-spacing:.3em;text-transform:uppercase;font-size:15px}
.arrow{width:38px;height:38px;flex:none;border:1px solid rgba(236,227,210,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;transition:.35s}
.card:hover .arrow{background:var(--cream);color:var(--bg);border-color:var(--cream);transform:rotate(-45deg)}

.strip{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}
.strip .card{height:300px;display:flex}
.strip .card .label{position:relative;z-index:2;align-self:flex-end;width:100%;display:flex;align-items:center;justify-content:space-between;padding:20px 22px}
.strip .card .label span{font-family:var(--serif);letter-spacing:.3em;text-transform:uppercase;font-size:15px}

/* ---------- menu pages ---------- */
.grid-page{display:grid;grid-template-columns:1fr 1.15fr;gap:12px;align-items:start}
.page-hero{position:sticky;top:12px;height:calc(100vh - 24px);display:flex}
.page-hero .inner{position:relative;z-index:2;align-self:flex-end;padding:clamp(26px,4vw,54px)}
.page-hero h1{font-family:var(--serif);font-weight:400;font-size:clamp(46px,5.5vw,92px);line-height:.97;letter-spacing:.03em;text-transform:uppercase}
.page-hero .crumb{color:var(--cream-dim);letter-spacing:.3em;text-transform:uppercase;font-size:11px;margin-bottom:14px}

.sheet{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:clamp(22px,3.4vw,56px);min-height:calc(100vh - 24px)}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px}
.chips a{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;border:1px solid var(--line);border-radius:9px;padding:9px 13px;color:var(--cream-dim);transition:.25s}
.chips a:hover{border-color:var(--accent);color:var(--cream)}
.note{color:var(--muted);text-align:center;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px}

.msec{padding-top:46px}
.msec .orn{margin-bottom:8px}
.subnote{text-align:center;color:var(--muted);font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:26px}
.item{padding:16px 0;border-bottom:1px solid rgba(43,39,29,.6)}
.item:last-child{border-bottom:none}
.item .row{display:flex;align-items:baseline;gap:12px}
.item .name{font-family:var(--serif);font-size:17px;letter-spacing:.14em;text-transform:uppercase;flex:none;max-width:70%}
.item .dots{flex:1;border-bottom:1px dotted rgba(141,134,114,.55);transform:translateY(-4px)}
.item .price{font-family:var(--serif);font-size:16px;letter-spacing:.08em;color:var(--accent);flex:none;white-space:nowrap}
.item .desc{margin-top:7px;color:var(--muted);font-size:13.5px;line-height:1.55;max-width:56ch}

/* ---------- gallery ---------- */
.gal{columns:3;column-gap:12px;padding-top:6px}
.gal a{display:block;margin-bottom:12px;border-radius:14px;overflow:hidden;border:1px solid var(--line);position:relative}
.gal img{width:100%;height:auto;transition:transform 1s cubic-bezier(.2,.7,.2,1),opacity .5s}
.gal a:hover img{transform:scale(1.05)}

/* ---------- lightbox ---------- */
.lb{position:fixed;inset:0;z-index:120;background:rgba(6,5,4,.94);display:none;align-items:center;justify-content:center;padding:5vmin;cursor:zoom-out}
.lb.open{display:flex}
.lb img{max-width:100%;max-height:100%;border-radius:12px}

/* ---------- footer ---------- */
footer{margin-top:12px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:clamp(30px,4vw,54px);display:grid;grid-template-columns:1fr auto 1fr;gap:26px;align-items:center}
footer .fl img{height:44px;width:auto}
footer .fl p{margin-top:12px;color:var(--muted);font-size:12px;max-width:32ch;line-height:1.6}
footer .fc{text-align:center}
footer .fc h4{font-family:var(--serif);letter-spacing:.3em;text-transform:uppercase;font-weight:400;font-size:14px;margin-bottom:10px}
footer .fc p{color:var(--cream-dim);font-size:13px;letter-spacing:.08em}
footer .fr{display:flex;gap:10px;justify-content:flex-end}
footer .fr a{width:42px;height:42px;border:1px solid var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--cream-dim);transition:.3s;font-size:13px}
footer .fr a:hover{border-color:var(--accent);color:var(--cream)}

.fade{animation:fade .6s ease both}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ---------- responsive ---------- */
@media (max-width:1100px){
  .grid-home{grid-template-columns:1fr}
  .hero-home{min-height:62vh}
  .strip{grid-template-columns:1fr}
  .strip .card{height:220px}
  .grid-page{grid-template-columns:1fr}
  .page-hero{position:relative;top:0;height:52vh;min-height:340px}
  .sheet{min-height:0}
  .gal{columns:2}
  footer{grid-template-columns:1fr;text-align:center}
  footer .fl{display:flex;flex-direction:column;align-items:center}
  footer .fr{justify-content:center}
  .nav .links{display:none}
}
@media (max-width:620px){
  .wrap{padding:8px}
  .gal{columns:1}

  /* nav compacto no topo */
  .nav{top:10px;left:10px;right:auto;padding:5px 10px 5px 5px;border-radius:12px}
  .nav .burger{width:36px;height:36px}
  .nav .logo img{height:24px;margin:0 8px}

  /* idiomas viram barra fixa embaixo (mais fácil com o polegar) */
  .langbar{top:auto;bottom:calc(12px + env(safe-area-inset-bottom));left:50%;right:auto;transform:translateX(-50%);padding:5px}
  .langbar button{padding:6px}
  .langbar button img{width:28px;height:19px}
  body{padding-bottom:70px}

  /* heros */
  .hero-home{min-height:66vh}
  .hero-home h1{font-size:clamp(44px,13vw,64px)}
  .page-hero{height:40vh;min-height:260px}
  .page-hero h1{font-size:clamp(34px,10vw,52px)}

  /* folha do menu */
  .sheet{padding:20px 16px;border-radius:14px}
  .chips{gap:6px}
  .chips a{font-size:9.5px;padding:7px 9px;letter-spacing:.12em}
  .msec{padding-top:36px}
  .orn{gap:8px}
  .orn::before,.orn::after{width:22px;flex:none}
  .orn h2{font-size:15px;letter-spacing:.2em}
  .item{padding:13px 0}
  .item .row{gap:8px}
  .item .name{max-width:62%;font-size:14px;letter-spacing:.08em;line-height:1.45}
  .item .price{font-size:13.5px}
  .item .desc{font-size:12.5px}

  .side .card{min-height:130px}
  .strip .card{height:180px}
  .side .card .label span,.strip .card .label span{font-size:13px;letter-spacing:.22em}
  .arrow{width:32px;height:32px;font-size:13px}

  footer{padding:26px 18px;gap:18px}
  footer .fl img{height:36px}

  .overlay nav a{font-size:clamp(28px,8.5vw,40px)}
  .overlay .close{top:16px;left:16px}
}
</style>
</head>

/* =====================  RENDER  ===================== */
const app = document.getElementById("app");
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;");

function navHTML(){
  const keys = ["cafetaria","chef","vinhos","bar","galeria"];
  const cur = location.hash.replace("#/","") || "home";
  return keys.map(k=>`<a href="#/${k}" class="${cur===k?"on":""}">${T(UI.nav[k])}</a>`).join("");
}
function renderChrome(){
  document.getElementById("navlinks").innerHTML = navHTML();
  document.getElementById("overlayNav").innerHTML =
    ["home","cafetaria","chef","vinhos","bar","galeria"]
    .map((k,i)=>`<a href="#/${k}" style="animation-delay:${.06*i}s">${T(UI.nav[k])}</a>`).join("");
  document.getElementById("langbar").innerHTML =
    LANGS.map(l=>`<button data-l="${l}" class="${l===lang?"on":""}" aria-label="${l.toUpperCase()}" title="${l.toUpperCase()}"><img src="https://flagcdn.com/${FLAG[l]}.svg" alt="${l.toUpperCase()}" loading="lazy"></button>`).join("");
  document.getElementById("footer").innerHTML = `
    <div class="fl"><img src="${LOGO}" alt="A Brasileira"><p>${T(UI.vat)}</p></div>
    <div class="fc"><h4>${T(UI.hours)}</h4><p>${T(UI.days)}</p><p>8:00 — 24:00</p></div>
    <div class="fr">
      <a href="https://www.facebook.com/CafeABrasileiraBraga" target="_blank" rel="noopener" aria-label="Facebook"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M22 12.06C22 6.5 17.52 2 12 2S2 6.5 2 12.06c0 5 3.66 9.15 8.44 9.94v-7.03H7.9v-2.9h2.54V9.85c0-2.51 1.49-3.9 3.78-3.9 1.09 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56v1.88h2.78l-.44 2.9h-2.34V22c4.78-.79 8.44-4.94 8.44-9.94Z"/></svg></a>
      <a href="https://www.instagram.com/abrasileira_braga/" target="_blank" rel="noopener" aria-label="Instagram"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.4" cy="6.6" r="1.2" fill="currentColor" stroke="none"/></svg></a>
    </div>`;
}

function homeHTML(){
  const card = (k,img)=>`
    <a class="card" href="#/${k}">
      <img src="${IMG+img}" alt="${T(UI.nav[k])}" loading="lazy"><div class="shade"></div>
      <div class="label"><span>${T(UI.nav[k])}</span><span class="arrow">→</span></div>
    </a>`;
  return `<div class="fade">
    <div class="grid-home">
      <a class="card hero-home" href="#/chef">
        <img src="${IMG}HM_00404_Easy-Resize.com_.jpg" alt="A Brasileira" fetchpriority="high"><div class="shade"></div>
        <div class="inner">
          <p style="margin:0 0 16px;letter-spacing:.3em;text-transform:uppercase;font-size:11px;color:var(--cream-dim)">${T(UI.tagline)}</p>
          <h1>A Brasileira</h1>
        </div>
      </a>
      <div class="side">
        ${card("cafetaria","Chavena_cafe.jpg")}
        ${card("chef","HM_06564_Easy-Resize.com_.jpg")}
        ${card("vinhos","HM_00388_Easy-Resize.com_.jpg")}
      </div>
    </div>
    <div class="strip">
      ${card("bar","Cocktails-2.jpg")}
      ${card("galeria","HM_00240_Easy-Resize.com_.jpg")}
      <a class="card" href="#/cafetaria" style="display:flex">
        <img src="${IMG}HM_06512.jpg" alt="" loading="lazy"><div class="shade"></div>
        <div class="label" style="position:relative;z-index:2;align-self:flex-end;width:100%;display:flex;align-items:center;justify-content:space-between;padding:20px 22px">
          <span style="font-family:var(--serif);letter-spacing:.3em;text-transform:uppercase;font-size:15px">${T(UI.menuWord)}</span><span class="arrow">→</span>
        </div>
      </a>
    </div>
  </div>`;
}

function sectionHTML(sec,pageDual){
  const dual = sec.dual || pageDual;
  return `<section class="msec" id="${sec.id}">
    <div class="orn"><span class="d"></span><h2>${T(sec.name)}</h2><span class="d"></span></div>
    ${dual?`<p class="subnote">${T(UI.interior)}</p>`:`<div style="height:26px"></div>`}
    ${sec.items.map(it=>`
      <div class="item">
        <div class="row"><span class="name">${T(it.n)}</span><span class="dots"></span><span class="price">${it.p}</span></div>
        ${it.d?`<p class="desc">${T(it.d)}</p>`:""}
      </div>`).join("")}
  </section>`;
}

function menuPageHTML(key){
  const pg = PAGES[key];
  return `<div class="grid-page fade">
    <a class="card page-hero" href="#/home">
      <img src="${pg.img}" alt="${T(pg.title)}" fetchpriority="high"><div class="shade"></div>
      <div class="inner"><p class="crumb">A Brasileira · Braga</p><h1>${T(pg.title)}</h1></div>
    </a>
    <div class="sheet">
      <div class="chips">${pg.sections.map(s=>`<a href="#${s.id}" data-anchor="${s.id}">${T(s.name)}</a>`).join("")}</div>
      <p class="note">${T(UI.vat)}</p>
      ${pg.sections.map(s=>sectionHTML(s,pg.dual)).join("")}
    </div>
  </div>`;
}

function galleryHTML(){
  return `<div class="fade">
    <div class="card page-hero" style="position:relative;height:44vh;min-height:300px;display:flex">
      <img src="${IMG}HM_00264_Easy-Resize.com_.jpg" alt="Galeria"><div class="shade"></div>
      <div class="inner"><p class="crumb">A Brasileira · Braga</p><h1>${T(UI.nav.galeria)}</h1>
      <p style="margin-top:12px;color:var(--cream-dim);font-size:13px;letter-spacing:.08em">${T(UI.galleryLead)}</p></div>
    </div>
    <div class="gal" style="margin-top:12px">
      ${PHOTOS.map(f=>`<a href="${IMG+f}" data-lb><img src="${IMG+f}" alt="A Brasileira" loading="lazy"></a>`).join("")}
    </div>
  </div>`;
}

function render(){
  const route = location.hash.replace("#/","") || "home";
  renderChrome();
  if(route==="home") app.innerHTML = homeHTML();
  else if(route==="galeria") app.innerHTML = galleryHTML();
  else if(PAGES[route]) app.innerHTML = menuPageHTML(route);
  else { location.hash="#/home"; return; }
  window.scrollTo({top:0});
  document.documentElement.lang = lang;

  /* smooth-scroll section chips without breaking the router */
  app.querySelectorAll("[data-anchor]").forEach(a=>{
    a.addEventListener("click",e=>{
      e.preventDefault();
      const el = document.getElementById(a.dataset.anchor);
      if(el) el.scrollIntoView({behavior:"smooth",block:"start"});
    });
  });
  /* lightbox */
  app.querySelectorAll("[data-lb]").forEach(a=>{
    a.addEventListener("click",e=>{
      e.preventDefault();
      document.getElementById("lbImg").src = a.href;
      document.getElementById("lb").classList.add("open");
    });
  });
}

/* =====================  EVENTS  ===================== */
window.addEventListener("hashchange",()=>{ closeOverlay(); render(); });
document.getElementById("langbar").addEventListener("click",e=>{
  const b = e.target.closest("button[data-l]");
  if(b){ lang = b.dataset.l; render(); }
});
const overlay = document.getElementById("overlay");
document.getElementById("burger").addEventListener("click",()=>overlay.classList.add("open"));
function closeOverlay(){ overlay.classList.remove("open"); }
document.getElementById("closeOverlay").addEventListener("click",closeOverlay);
const lb = document.getElementById("lb");
lb.addEventListener("click",()=>lb.classList.remove("open"));
document.addEventListener("keydown",e=>{ if(e.key==="Escape"){ closeOverlay(); lb.classList.remove("open"); } });

render();
</script>
